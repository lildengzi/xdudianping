<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="admin/module/_header"></div>
<div class="wrapper">
    <!-- 菜单栏模块 -->
    <div th:replace="admin/module/_sidebar"></div>
    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper">

        <section class="content-header">
            <h1 style="display: inline-block;">笔记详情</h1>
            <ol class="breadcrumb">
                <li>
                    <a data-pjax="true" href="#"><i
                            class="fa fa-dashboard"></i> 首页</a>
                </li>
                <li>
                    <a data-pjax="true" href="#">笔记管理</a>
                </li>
                <li class="active">详情</li>
            </ol>
        </section>
        <section class="content">
            <div class="row">
                <div class="col-md-12">
                    <!-- general form elements -->
                    <div class="box box-primary">
                        <!-- form start -->

                        <div class="box-body">
                            <div class="row">
                                <form id="form">
                                    <div class="col-md-12">

                                        <input type="hidden" id="id" name="id" th:value="${item.id}">


                                        <div class="form-group">
                                            <label>笔记标题</label>
                                            <input type="text" disabled class="form-control" id="title" name="title"
                                                   th:value="${item.title}">
                                        </div>

                                        <div class="form-group">
                                            <label>笔记内容</label>
                                            <div th:utext="${item.content}">

                                            </div>
                                        </div>


                                    </div>
                                </form>


                            </div>

                            <!-- /.box-body -->
                            <div class="box-footer">
                                <a href="/admin/note" type="button" class="btn btn-info btn-sm">返回</a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>



            /**
             * 提交
             * @param status 状态
             */
            function save() {
                $.ajax({
                    type: 'POST',
                    url: '/admin/note/save',
                    async: false,
                    data: {
                        'id': $('#id').val(),
                        'title': $('#title').val(),
                        'content': tinymce.activeEditor.getContent()
                    },
                    success: function (data) {
                        if (data.code == 1) {
                            showMsgAndRedirect("保存成功", "success", 1000, "/admin/note/list");
                        } else {
                            showMsg(data.msg, "error", 1000);
                        }
                    }
                });
            }


        </script>
    </div>

</div>
<div th:replace="admin/module/_footer"></div>
