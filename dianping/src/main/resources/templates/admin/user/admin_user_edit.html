<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="admin/module/_header"></div>

<div class="wrapper">
    <!-- 菜单栏模块 -->
    <div th:replace="admin/module/_sidebar"></div>
    <div class="content-wrapper">
        <style>
            .form-horizontal .control-label {
                text-align: left;
            }
        </style>
        <section class="content-header">
            <h1>
                修改用户
            </h1>
            <ol class="breadcrumb">
                <li>
                    <a data-pjax="true" href="/admin">
                        <i class="fa fa-dashboard"></i> 首页</a>
                </li>
                <li><a data-pjax="true" href="#">用户管理</a></li>
                <li class="active">修改用户</li>
            </ol>
        </section>
        <!-- tab选项卡 -->
        <section class="content container-fluid">
            <div class="row">
                <div class="col-md-12">
                    <div class="nav-tabs-custom">
                        <ul class="nav nav-tabs">
                            <li class="active">
                                <a href="#general"
                                   data-toggle="tab">基本信息</a>
                            </li>
                            <!--<li>
                                <a href="#pass"
                                   data-toggle="tab">修改密码</a>
                            </li>-->
                        </ul>
                        <div class="tab-content">
                            <div class="tab-pane active" id="general">
                                <form method="post" class="form-horizontal" id="form">
                                    <input type="hidden" name="id" th:value="${user.id}">
                                    <div class="box-body">
                                        <div class="form-group">
                                            <label for="userAvatar"
                                                   class="col-lg-2 col-sm-4 control-label">照片</label>
                                            <div class="col-lg-4 col-sm-8">
                                                <div class="input-group">
                                                    <input type="hidden" class="form-control"
                                                           id="userAvatar"
                                                           name="userAvatar" th:value="${user.userAvatar}">
                                                    <span class="input-group-btn">
                                                    <input type="file" id="file" accept=".png, .jpg, .jpeg" style="display: none">
                                                        <button onclick="$('#file').click();" class="btn btn-default "
                                                                type="button">选择图片</button>
                                                    </span>
                                                </div>
                                                <img th:src="${user.userAvatar}" id="userAvatarImg" style="width: 200px;" alt="">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="roleId" class="col-lg-2 col-sm-4 control-label">
                                                角色
                                            </label>
                                            <div class="col-lg-4 col-sm-8">
                                                <select class="form-control" name="roleId" id="roleId">
                                                    <option value="" selected disabled>角色</option>
                                                    <option th:value="${role.id}" th:each="role : ${roles}"
                                                            th:selected="${currentRole != null && currentRole.id == role.id}">
                                                        [[${role.description}]]
                                                    </option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="userName"
                                                   class="col-lg-2 col-sm-4 control-label">账号 *
                                            </label>
                                            <div class="col-lg-4 col-sm-8">
                                                <input type="text" class="form-control" id="userName" name="userName"
                                                       th:value="${user.userName}">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="userPass"
                                                   class="col-lg-2 col-sm-4 control-label">密码 *
                                            </label>
                                            <div class="col-lg-4 col-sm-8">
                                                <input type="password" class="form-control" id="userPass" name="userPass"
                                                       th:value="${user.userPass}">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="userDisplayName"
                                                   class="col-lg-2 col-sm-4 control-label">姓名 *
                                            </label>
                                            <div class="col-lg-4 col-sm-8">
                                                <input type="text" class="form-control" id="userDisplayName"
                                                       name="userDisplayName" th:value="${user.userDisplayName}">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="phone"
                                                   class="col-lg-2 col-sm-4 control-label">电话</label>
                                            <div class="col-lg-4 col-sm-8">
                                                <input type="text" class="form-control" id="phone"
                                                       name="phone"
                                                       th:value="${user.phone}">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="email"
                                                   class="col-lg-2 col-sm-4 control-label">电子邮箱</label>
                                            <div class="col-lg-4 col-sm-8">
                                                <input type="email" class="form-control" id="email"
                                                       name="email"
                                                       th:value="${user.email}">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="box-footer">
                                        <button type="button" class="btn btn-primary btn-sm"
                                                onclick="saveUser()">保存
                                        </button>
                                        <a class="btn btn-info btn-sm" href="javascript:history.go(-1);">返回</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script th:inline="javascript">

            function saveUser() {

                var userName = $('#userName').val();
                var userDisplayName = $('#userDisplayName').val();
                var userPass = $('#userPass').val();
                var roleId = $('#roleId').val();
                if (userName == "" || userDisplayName == "" || userPass == "" || roleId == "" ||
                    userName == null || userDisplayName == null || userPass == null || roleId == null) {
                    showMsg('请输入完整信息', "error", 2000);
                    return;
                }

                var param =  $('#form').serialize();
                $.ajax({
                    type: 'post',
                    url: '/admin/user/save',
                    data: param,
                    success: function (data) {
                        console.log(data);
                        if (data.code == 1) {
                            showMsgAndRedirect(data.msg, "success", 1000, "/admin/user")
                        } else {
                            showMsg(data.msg, "error", 2000);
                        }
                    }
                });
            }

            $('body').on('change', '#file', function () {
                var formData = new FormData();
                var files = $($(this))[0].files[0];
                formData.append("file", files);
                $.ajax({
                    url: '/admin/file/upload',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    dataType: 'json',
                    success: function (res) {
                        console.log(res);
                        $('#userAvatar').val(res.link);
                        $('#userAvatarImg').attr('src', res.link);
                    }
                    , error: function (res) {
                    }
                });
            })
        </script>
    </div>
</div>
<div th:replace="admin/module/_footer"></div>
